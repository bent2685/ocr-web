name: Deploy example to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ocr-web/core build
      - run: pnpm --filter @ocr-web/models-ppocrv5 build
      - name: Build example
        env:
          GITHUB_PAGES: "1"
        run: pnpm --filter @ocr-web-example/browser build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/browser/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
