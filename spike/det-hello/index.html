<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ocr-web spike — PP-OCRv5 det + rec</title>
		<style>
			body {
				font-family: -apple-system, system-ui, sans-serif;
				margin: 24px;
				max-width: 1200px;
			}
			.row { display: flex; gap: 16px; flex-wrap: wrap; }
			.panel { border: 1px solid #ddd; padding: 12px; border-radius: 8px; flex: 1; min-width: 300px; }
			canvas { border: 1px solid #999; display: block; max-width: 100%; height: auto; }
			pre { background: #f4f4f4; padding: 8px; border-radius: 4px; max-height: 240px; overflow: auto; font-size: 12px; }
			button { padding: 6px 12px; font-size: 14px; cursor: pointer; margin-right: 8px; }
			.status { color: #555; font-size: 13px; margin: 8px 0; }
			.error { color: #c00; }
			.ok { color: #060; }
			h2 { margin-top: 24px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
			.meta { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
			.meta div { padding: 2px 0; }
		</style>
	</head>
	<body>
		<h1>PP-OCRv5 Spike — det + rec</h1>

		<h2>① 模型元数据</h2>
		<div class="panel meta" id="meta">加载中…</div>

		<h2>② Detection 验证</h2>
		<div class="panel">
			<input type="file" id="file" accept="image/*" />
			<button id="runDet" disabled>Run det</button>
			<div class="status" id="detStatus">等待选图…</div>
			<div class="row" style="margin-top: 8px">
				<div><h4>Input</h4><canvas id="inputCanvas"></canvas></div>
				<div><h4>Probability map</h4><canvas id="probCanvas"></canvas></div>
			</div>
		</div>

		<h2>③ Recognition 验证（合成输入 sanity check）</h2>
		<div class="panel">
			<p style="font-size: 13px; color: #555">
				喂一个 [1,3,48,320] 的全零张量给 rec，确认 session.run 不报错且输出 shape 是 [1, T, C]，
				C 应等于 字典长度 + 1（CTC blank）。这一步通过就证明 rec 流水线可用，
				真实裁剪 + perspective transform 留到 Phase 1。
			</p>
			<button id="runRec" disabled>Run rec sanity</button>
			<div class="status" id="recStatus">等待…</div>
		</div>

		<h2>Log</h2>
		<pre id="log"></pre>

		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
